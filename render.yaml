databases:
  # 1. Managed PostgreSQL Database (free tier)
  - name: egg-guardian-db
    plan: free
    region: ohio

services:
  # 2. FastAPI Backend Service
  # Note: Render no longer offers a free tier for web services.
  # The cheapest paid option is "starter" ($7/month).
  # Remove the 'plan' key below to be prompted to choose a plan in the dashboard.
  - type: web
    name: egg-guardian-api
    env: python
    region: ohio
    buildCommand: "cd services/api && pip install -r requirements.txt"
    startCommand: "cd services/api && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: egg-guardian-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

  # 3. Static Admin Dashboard (always free on Render, no plan field required)
  - type: web
    name: egg-guardian-admin
    env: static
    buildCommand: ""
    staticPublishPath: "./admin"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
